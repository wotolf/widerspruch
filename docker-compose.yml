services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: widerspruch-postgres
    environment:
      POSTGRES_DB: widerspruch
      POSTGRES_USER: widerspruch
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U widerspruch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
